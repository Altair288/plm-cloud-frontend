name: Frontend CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

concurrency:
  group: "frontend-ci-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: '24.5'

jobs:
  quality:
    name: Frontend Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - id: install
        name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          # Use legacy-peer-deps to avoid peer dependency resolution failures
          if [ -f package-lock.json ]; then
            echo "command=npm ci --legacy-peer-deps" >> "$GITHUB_OUTPUT"
            npm ci --legacy-peer-deps
          else
            echo "command=npm install --legacy-peer-deps" >> "$GITHUB_OUTPUT"
            npm install --legacy-peer-deps
          fi

      - id: typecheck
        name: Type check (tsc)
        run: npx tsc --noEmit

      - id: lint
        name: Lint
        run: npm run lint --if-present

      - id: build_app
        name: Build
        run: npm run build --if-present

      - name: Upload build artifact (optional)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: .next

      - name: Quality summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Frontend Quality Summary"
            echo ""
            echo "- Node version: ${{ env.NODE_VERSION }}"
            echo "- Install command: ${{ steps.install.outputs.command }}"
            echo "- Install step: ${{ steps.install.outcome }}"
            echo "- Type check step: ${{ steps.typecheck.outcome }}"
            echo "- Lint step: ${{ steps.lint.outcome }}"
            echo "- Build step: ${{ steps.build_app.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"

  release_gate:
    name: Release Gate
    runs-on: ubuntu-latest
    needs: quality
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
      reason: ${{ steps.decide.outputs.reason }}

    steps:
      - id: decide
        name: Decide whether to build container
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail

          should_build="false"
          reason="normal_commit"
          commit_message="${HEAD_COMMIT_MESSAGE:-}"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            should_build="true"
            reason="manual_dispatch"
          elif [ "$EVENT_NAME" = "push" ] && [[ "$REF_NAME" == v* ]]; then
            should_build="true"
            reason="tag_push"
          elif [ "$EVENT_NAME" = "push" ] && echo "$commit_message" | grep -Eiq '(^|[^a-z])(release|publish|push image|push release|ship)([^a-z]|$)|\[(release|publish|push)\]'; then
            should_build="true"
            reason="release_keyword_in_commit"
          fi

          echo "should_build=$should_build" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"

      - name: Release gate summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Release Gate Summary"
            echo ""
            echo "- Event: ${{ github.event_name }}"
            echo "- Ref name: ${{ github.ref_name }}"
            echo "- Should build container: ${{ steps.decide.outputs.should_build }}"
            echo "- Decision reason: ${{ steps.decide.outputs.reason }}"
            echo "- Head commit message: ${{ github.event.head_commit.message || 'N/A' }}"
          } >> "$GITHUB_STEP_SUMMARY"

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: [quality, release_gate]
    if: needs.release_gate.outputs.should_build == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: prepare_image
        name: Resolve image settings
        shell: bash
        run: |
          set -euo pipefail

          registry="ghcr.io"
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo_name="$(basename "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          repository="${owner}/${repo_name}"
          push_enabled="false"

          if [ "${GITHUB_EVENT_NAME}" != "pull_request" ]; then
            push_enabled="true"
          fi

          image_ref="${registry}/${repository}"

          echo "registry=$registry" >> "$GITHUB_OUTPUT"
          echo "repository=$repository" >> "$GITHUB_OUTPUT"
          echo "image=$image_ref" >> "$GITHUB_OUTPUT"
          echo "push=$push_enabled" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.prepare_image.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - id: metadata
        name: Generate image metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prepare_image.outputs.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - id: build_image
        name: Build and optionally push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ steps.prepare_image.outputs.push == 'true' }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            INTERNAL_API_BASE_URL=http://gateway:8080
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Docker Image Summary"
            echo ""
            echo "- Resolved registry: ${{ steps.prepare_image.outputs.registry }}"
            echo "- Resolved repository: ${{ steps.prepare_image.outputs.repository }}"
            echo "- Full image reference: ${{ steps.prepare_image.outputs.image }}"
            echo "- Push enabled: ${{ steps.prepare_image.outputs.push }}"
            echo "- Trigger reason: ${{ needs.release_gate.outputs.reason }}"
            echo "- Metadata step: ${{ steps.metadata.outcome }}"
            echo "- Build step: ${{ steps.build_image.outcome }}"
            echo "- Digest: ${{ steps.build_image.outputs.digest }}"
            echo ""
            echo "### Tags"
            echo '${{ steps.metadata.outputs.tags }}'
          } >> "$GITHUB_STEP_SUMMARY"
